<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>服务入口</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
    background: linear-gradient(135deg, #eef2f7, #f8fafc);
    color: #333;
}

/* 顶部 */
.header {
    text-align: center;
    padding: 50px 20px 20px;
}

.logo {
    font-size: 26px;
    font-weight: 600;
}

.subtitle {
    font-size: 14px;
    color: #777;
    margin-top: 8px;
}

/* 卡片 */
.container {
    max-width: 520px;
    margin: 20px auto;
    padding: 20px;
}

.card {
    background: #fff;
    border-radius: 16px;
    padding: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* 按钮 */
.btn {
    display: block;
    text-align: center;
    padding: 14px;
    margin-top: 12px;
    border-radius: 10px;
    text-decoration: none;
    font-size: 16px;
    transition: all 0.2s ease;
}

.btn-main {
    background: linear-gradient(135deg,#1677ff,#4096ff);
    color: #fff;
}

.btn-back {
    background: #f1f5f9;
    color: #333;
}

.btn-alt {
    background: #f1f5f9;
    color: #333;
}

.btn:hover {
    transform: translateY(-2px);
}

/* 提示 */
.notice {
    font-size: 13px;
    color: #888;
    margin-top: 15px;
    text-align: center;
}

/* TG */
.tg {
    margin-top: 18px;
    text-align: center;
}

.tg a {
    text-decoration: none;
    font-size: 14px;
    color: #1677ff;
}

/* 底部 */
.footer {
    text-align: center;
    font-size: 12px;
    color: #aaa;
    margin-top: 30px;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">服务入口</div>
    <div class="subtitle">请选择可用线路访问</div>
</div>

<div class="container">
    <div class="card">

        <a class="btn btn-main" href="https://www.dingxiang.app">
            🚀 主线路（推荐）
        </a>

        <a class="btn btn-back" href="https://www.dingxiang.app">
            🌐 备用线路
        </a>

        <a class="btn btn-alt" href="https://www.dingxiang.app">
            🛰 备用线路2
        </a>

        <div class="tg">
            <a href="https://t.me/dingxiangapp" target="_blank">
                📩 获取最新通知
            </a>
        </div>

        <div class="notice">
            若无法访问，请切换网络或尝试其他线路
        </div>

    </div>

    <div class="footer">
        更新时间：2026-03-24
    </div>
</div>

</body>
</html>
